<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Breakout Piano · Robin Blocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* --bg / --canvas-bg / --canvas-border are overwritten at runtime
       by the theme script in <head> with subtle gradients. The solid
       values here are a maroon fallback if the script fails. */
    --bg: #2a1820;
    --canvas-bg: #5b2d3d;
    --canvas-border: #3a1a26;
    --ink: #e8d8cc;
    --ink-2: #c9a89a;
    --ink-3: #8e6a6a;
    --chrome: rgba(255,255,255,0.06);
    --chrome-hover: rgba(255,255,255,0.12);
    --chrome-border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: var(--ink);
    user-select: none;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    z-index: 10;
    pointer-events: none;
  }
  .topbar > * { pointer-events: auto; }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 10px;
    color: var(--ink);
    background: var(--chrome);
    border: 1px solid var(--chrome-border);
    text-decoration: none;
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .15s;
  }
  .back-btn:hover {
    background: var(--chrome-hover);
    border-color: rgba(255,255,255,0.18);
  }
  .back-btn:active { transform: translateY(1px); }
  .back-btn svg { display: block; }
  .brand {
    font-size: 12.5px;
    color: var(--ink-2);
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .brand b { color: var(--ink); font-weight: 700; letter-spacing: -0.01em; }
  .stage {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 80px 16px 32px;
  }
  #hint {
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--ink-2);
    font-weight: 500;
  }
  canvas {
    background: var(--canvas-bg);
    border: 1px solid var(--canvas-border);
    border-radius: 10px;
    cursor: none;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.55);
    max-width: 100%;
    height: auto;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }

  .sound-btn {
    position: fixed;
    bottom: 18px;
    right: 18px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(0,0,0,0.45);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 20;
    padding: 0;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    -webkit-tap-highlight-color: transparent;
    transition: background .15s, border-color .15s, transform .15s, color .15s;
  }
  .sound-btn:hover { background: rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.32); }
  .sound-btn:active { transform: scale(0.94); }
  .sound-btn svg { display: block; }
  .sound-btn.muted { color: rgba(255,180,180,0.9); }
  .sound-btn .icon-muted { display: none; }
  .sound-btn.muted .icon-on { display: none; }
  .sound-btn.muted .icon-muted { display: block; }
  .sound-btn.pulse {
    animation: soundPulse 1.6s ease-in-out infinite;
  }
  @keyframes soundPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 216, 77, 0.0); }
    50% { box-shadow: 0 0 0 8px rgba(255, 216, 77, 0.15); }
  }

  /* Mobile (any orientation): full-bleed canvas */
  @media (max-width: 1000px) {
    html, body { height: 100dvh; overflow: hidden; }
    .stage {
      padding: 0;
      min-height: 100dvh;
      height: 100dvh;
    }
    #hint { display: none; }
    .brand { display: none; }
    canvas {
      width: 100vw;
      height: 100dvh;
      max-width: none;
      border: none;
      border-radius: 0;
      box-shadow: none;
      display: block;
    }
    .topbar { padding: 8px 10px; }
    .back-btn {
      padding: 5px 9px;
      font-size: 12px;
      opacity: 0.65;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .back-btn:active { opacity: 1; }
  }
</style>
<script>
  // Pick one of 20 dark color themes at random on page load. Each theme
  // is [bodyTop, bodyBottom, canvasTop, canvasBottom, border]. The body
  // and canvas get subtle linear gradients for depth; the border picks
  // up a slightly darker shade than the canvas to keep edges grounded.
  // Runs in <head> so the variables are set before the first paint.
  (() => {
    const T = [
      ['#2a1820','#170c12','#5b2d3d','#3e1d2a','#3a1a26'], // maroon
      ['#2a0f18','#16060c','#571a30','#3a0e20','#2e0a18'], // burgundy
      ['#0e1f1a','#050f0c','#1f4438','#122b22','#0e2218'], // forest
      ['#0c1a18','#050f0e','#18403a','#0e2a26','#0a201c'], // pine
      ['#0f1a2e','#050b18','#1e3258','#122040','#0a1a30'], // midnight
      ['#10122e','#060818','#232861','#161a3f','#0e1226'], // indigo
      ['#1d1024','#0e0612','#421f50','#2c1238','#1f0a26'], // plum
      ['#1a0e1f','#0c0510','#3c1e44','#28122e','#1a0820'], // aubergine
      ['#1d0e1a','#0e0610','#46193e','#2f0c2a','#1c0820'], // mulberry
      ['#1f1410','#100a08','#422a22','#2c1a14','#1c0e0a'], // mocha
      ['#1a100a','#0d0805','#3a2418','#251408','#160c06'], // espresso
      ['#1a0f08','#0d0805','#3a2014','#261308','#160a05'], // cocoa
      ['#22120a','#100804','#4f2510','#321806','#1c0c04'], // rust
      ['#1a1c0e','#0d0e06','#383a18','#23260e','#15170a'], // olive
      ['#16161a','#08080c','#2a2a32','#1a1a22','#101014'], // charcoal
      ['#13181f','#07090e','#283042','#161e2c','#0c1320'], // slate
      ['#0a141a','#040b10','#173044','#0d1f2c','#061218'], // petrol
      ['#0a1c20','#04101a','#154048','#0c282e','#06161a'], // teal abyss
      ['#0a1620','#040c14','#163448','#0c1f2c','#061018'], // deep ocean
      ['#0c0e16','#04060c','#1a2030','#0e1220','#06080e'], // onyx blue
    ];
    const t = T[Math.floor(Math.random() * T.length)];
    const r = document.documentElement.style;
    r.setProperty('--bg',            `linear-gradient(160deg, ${t[0]} 0%, ${t[1]} 100%)`);
    r.setProperty('--canvas-bg',     `linear-gradient(180deg, ${t[2]} 0%, ${t[3]} 100%)`);
    r.setProperty('--canvas-border', t[4]);
  })();
</script>
</head>
<body>
<div class="topbar">
  <a class="back-btn" href="/" aria-label="Back to home">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    <span>Back</span>
  </a>
  <div class="brand"><b>Breakout Piano</b> · robinblocks.com</div>
</div>
<div class="stage">
  <div id="hint">Move mouse to aim paddle · Click to launch · Keep the ball alive for 3 lives</div>
  <canvas id="game" width="840" height="600"></canvas>
</div>
<audio id="silent-loop" src="/silent.wav" loop preload="auto" playsinline style="display:none"></audio>
<button id="sound-btn" class="sound-btn pulse" type="button" aria-label="Toggle sound">
  <svg class="icon-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor"/>
    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
  </svg>
  <svg class="icon-muted" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor"/>
    <line x1="23" y1="9" x2="17" y2="15"/>
    <line x1="17" y1="9" x2="23" y2="15"/>
  </svg>
</button>
<script>
  // Pre-game: on mobile, size the canvas's internal dimensions to match the
  // viewport aspect so CSS stretching doesn't distort the ball (circle) or
  // skew keys. Portrait gets a taller game field (longer ball travel);
  // landscape stays wider. The game IIFE below reads these dimensions on init.
  (() => {
    if (!window.matchMedia('(max-width: 1000px)').matches) return;
    const canvas = document.getElementById('game');
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    if (vh >= vw) {
      // Portrait: longer dimension is vertical — give the ball more travel
      canvas.height = 900;
      canvas.width = Math.max(360, Math.round(900 * vw / vh));
    } else {
      // Landscape: match viewport aspect, keep game height at 600
      canvas.height = 600;
      canvas.width = Math.min(2000, Math.round(600 * vw / vh));
    }
  })();
</script>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // ---- Audio ----
  // Two-layer iOS unlock: (1) resume AudioContext + play a silent buffer so
  // the WebAudio graph is unblocked for later async oscillators; (2) kick
  // the preloaded <audio id="silent-loop"> so the iOS audio session
  // switches from "Ambient" (respects mute switch) to "Playback" (ignores
  // it). Both must run inside a user gesture.
  let audio;
  let masterGain = null;
  const silentEl = document.getElementById('silent-loop');
  const soundBtn = document.getElementById('sound-btn');
  if (silentEl) silentEl.volume = 0.001;
  let muted = (() => {
    try {
      const v = localStorage.getItem('breakout-piano-muted');
      if (v === '1') return true;
      if (v === '0') return false;
    } catch {}
    // First visit on a touch device: default to muted so the pulsing
    // button visually invites a tap. The unmute click runs playBeep()
    // through WebAudio inside the user gesture, which is what reliably
    // flips the iOS audio session out of "Ambient" mode (where the
    // hardware silent switch mutes everything). Desktop keeps the
    // previous default of unmuted.
    return navigator.maxTouchPoints > 0;
  })();
  const audioOut = () => masterGain || (audio ? audio.destination : null);
  const updateSoundIcon = () => {
    if (!soundBtn) return;
    soundBtn.classList.toggle('muted', muted);
    soundBtn.classList.toggle('pulse', muted);
    soundBtn.setAttribute('aria-label', muted ? 'Unmute sound' : 'Mute sound');
  };
  const setMuted = (m) => {
    muted = m;
    try { localStorage.setItem('breakout-piano-muted', m ? '1' : '0'); } catch {}
    if (masterGain) masterGain.gain.value = m ? 0 : 1;
    updateSoundIcon();
  };
  const playBeep = (freq = 660, dur = 0.12) => {
    if (!audio) return;
    const t = audio.currentTime;
    const osc = audio.createOscillator();
    const gain = audio.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.25, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(gain).connect(audioOut());
    osc.start(t);
    osc.stop(t + dur + 0.05);
  };
  if (soundBtn) {
    soundBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      initAudio();              // creates ctx + runs iOS unlock if needed,
                                // re-runs unlock if the session went stale
      setMuted(!muted);
      if (!muted) playBeep();   // positive feedback when turning sound on
    });
    updateSoundIcon();
  }

  // ---- Piano soundfont (MusyngKite acoustic_grand_piano) ----
  // Fetch per-pitch MP3 samples on first audio unlock and cache decoded
  // AudioBuffers. playNote prefers the sample; falls back to the triangle
  // oscillator if the sample hasn't arrived yet or the fetch fails.
  const PIANO_URL = 'https://gleitz.github.io/midi-js-soundfonts/MusyngKite/acoustic_grand_piano-mp3/';
  const SHARP_TO_FLAT = { 'C#': 'Db', 'D#': 'Eb', 'F#': 'Gb', 'G#': 'Ab', 'A#': 'Bb' };
  const pianoBuffers = {};         // noteName -> AudioBuffer | null (null = failed)
  let pianoPreloadStarted = false;
  const toSoundfontName = (note) => {
    const m = note.match(/^([A-G]#?)(\d+)$/);
    if (!m) return note;
    const letter = m[1];
    if (letter.length === 2) return (SHARP_TO_FLAT[letter] || letter) + m[2];
    return note;
  };
  const loadPianoNote = async (note) => {
    if (note in pianoBuffers) return;
    try {
      const res = await fetch(PIANO_URL + toSoundfontName(note) + '.mp3');
      if (!res.ok) throw new Error('http ' + res.status);
      const arr = await res.arrayBuffer();
      const buf = await audio.decodeAudioData(arr);
      pianoBuffers[note] = buf;
    } catch (e) {
      pianoBuffers[note] = null;
    }
  };
  const preloadPianoSamples = () => {
    if (pianoPreloadStarted) return;
    pianoPreloadStarted = true;
    const pitches = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    for (const o of [4, 5, 6]) {
      for (const p of pitches) loadPianoNote(p + o);
    }
  };

  const initAudio = () => {
    if (!audio) {
      try {
        audio = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) { return; }
      masterGain = audio.createGain();
      masterGain.gain.value = muted ? 0 : 1;
      masterGain.connect(audio.destination);
      preloadPianoSamples();
    }
    if (audio.state === 'suspended') audio.resume().catch(() => {});
    try {
      const buf = audio.createBuffer(1, Math.max(1, (audio.sampleRate * 0.05) | 0), audio.sampleRate);
      const src = audio.createBufferSource();
      src.buffer = buf;
      src.connect(audio.destination);
      src.start(0);
    } catch (e) {}
    if (silentEl && silentEl.paused) silentEl.play().catch(() => {});
    updateSoundIcon();
  };

  const playNote = (noteArg, gainScale = 1) => {
    if (!audio) return;
    const t = audio.currentTime;
    let noteName = null, freq;
    if (typeof noteArg === 'string') {
      noteName = noteArg;
      freq = noteFreq(noteArg);
    } else {
      freq = noteArg;
    }
    // Prefer piano sample when available
    const pianoBuf = noteName ? pianoBuffers[noteName] : null;
    if (pianoBuf) {
      const src = audio.createBufferSource();
      src.buffer = pianoBuf;
      const gain = audio.createGain();
      gain.gain.value = 0.75 * gainScale;
      src.connect(gain).connect(audioOut());
      src.start(t);
      return;
    }
    // Fallback: triangle oscillator with ADSR
    const osc = audio.createOscillator();
    const gain = audio.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.35 * gainScale, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.8);
    osc.connect(gain).connect(audioOut());
    osc.start(t);
    osc.stop(t + 0.85);
  };

  // ---- Notes ----
  const SEMI = { C:-9, 'C#':-8, D:-7, 'D#':-6, E:-5, F:-4, 'F#':-3, G:-2, 'G#':-1, A:0, 'A#':1, B:2 };
  const noteFreq = (n) => {
    const m = n.match(/([A-G]#?)(\d)/);
    const semis = SEMI[m[1]] + (parseInt(m[2]) - 4) * 12;
    return 440 * Math.pow(2, semis / 12);
  };

  // ---- Music theory (chord detection) ----
  const PC_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const PC_INDEX = { C:0, 'C#':1, D:2, 'D#':3, E:4, F:5, 'F#':6, G:7, 'G#':8, A:9, 'A#':10, B:11 };
  const pitchClass = (note) => PC_INDEX[note.replace(/\d/g, '')];
  const pcToFreq = (pc, oct) => noteFreq(PC_NAMES[pc] + oct);
  const chordLabel = (c) => {
    const name = c.type === 'maj' ? 'Major' : c.type === 'min' ? 'minor' : 'dim';
    return `${PC_NAMES[c.root]} ${name}`;
  };
  const detectChord = (pcs) => {
    const set = new Set(pcs);
    if (set.size < 3) return null;
    for (const root of set) {
      if (set.has((root + 4) % 12) && set.has((root + 7) % 12)) return { root, type: 'maj', third: 4, fifth: 7 };
      if (set.has((root + 3) % 12) && set.has((root + 7) % 12)) return { root, type: 'min', third: 3, fifth: 7 };
      if (set.has((root + 3) % 12) && set.has((root + 6) % 12)) return { root, type: 'dim', third: 3, fifth: 6 };
    }
    return null;
  };

  // ---- Keyboard layout ----
  // Grid: each white key spans 4 sub-columns; each black key spans 2 sub-columns
  // straddling the boundary between two whites. In the lower region (below the
  // black-key line) whites extend their full 4 sub-columns side-by-side. In the
  // upper region the black keys "steal" 1 sub-column from each adjacent white,
  // yielding C/E/F/B with 3-wide tops and D/G/A with 2-wide tops — the real
  // piano geometry. Nothing overlaps — each cell is a distinct block.
  const WHITES_IN_OCT = ['C','D','E','F','G','A','B'];
  const BLACK_AFTER = { C:'C#', D:'D#', F:'F#', G:'G#', A:'A#' };
  const UW = 4;                // sub-columns per white key (bottom width)
  const UB = 2;                // sub-columns per black key (centered on boundary)
  const NUM_OCTAVES = 2;
  const totalSubcols = NUM_OCTAVES * WHITES_IN_OCT.length * UW;
  const unitPx = W / totalSubcols;

  const whites = [];
  const blacks = [];
  {
    let cursor = 0;
    for (let o = 0; o < NUM_OCTAVES; o++) {
      const oct = 4 + o;
      for (const letter of WHITES_IN_OCT) {
        const note = letter + oct;
        whites.push({
          note, letter, oct, freq: noteFreq(note),
          bStart: cursor, bEnd: cursor + UW,
          tStart: cursor, tEnd: cursor + UW,
        });
        cursor += UW;
      }
    }
    for (let i = 0; i < whites.length; i++) {
      const w = whites[i];
      const bk = BLACK_AFTER[w.letter];
      const nextW = whites[i + 1];
      if (!bk || !nextW) continue;
      const boundary = w.bEnd;
      const tStart = boundary - UB / 2;
      const tEnd = boundary + UB / 2;
      const note = bk + w.oct;
      blacks.push({ note, freq: noteFreq(note), tStart, tEnd });
      w.tEnd = tStart;          // black shaves the right of this white's top
      nextW.tStart = tEnd;      // and the left of the next white's top
    }
  }

  // Lookup: note name -> horizontal center px (used for playback visuals)
  const noteToX = new Map();
  for (const w of whites) noteToX.set(w.note, ((w.bStart + w.bEnd) / 2) * unitPx);
  for (const b of blacks) noteToX.set(b.note, ((b.tStart + b.tEnd) / 2) * unitPx);

  // ---- Vertical dimensions ----
  const WKH = 160;              // white key total length
  const BKH = 96;               // black key length / upper-region height
  const KEYBOARD_TOP = H - WKH;
  const MID = KEYBOARD_TOP + BKH;
  const TOP_SLICES = 3;         // slices in the upper region
  const BOT_SLICES = 2;         // slices in the lower region (whites only)

  // ---- Blocks ----
  const blocks = [];
  const buildBlocks = () => {
    blocks.length = 0;
    const topSliceH = BKH / TOP_SLICES;
    const botSliceH = (WKH - BKH) / BOT_SLICES;

    for (const w of whites) {
      // narrow upper slices
      const tx = w.tStart * unitPx;
      const tw = (w.tEnd - w.tStart) * unitPx;
      for (let s = 0; s < TOP_SLICES; s++) {
        blocks.push({
          x: tx, y: KEYBOARD_TOP + s * topSliceH, w: tw, h: topSliceH,
          note: w.note, freq: w.freq,
          black: false, alive: true, flash: 0, isBottom: false,
        });
      }
      // wide lower slices
      const bx = w.bStart * unitPx;
      const bw = (w.bEnd - w.bStart) * unitPx;
      for (let s = 0; s < BOT_SLICES; s++) {
        blocks.push({
          x: bx, y: MID + s * botSliceH, w: bw, h: botSliceH,
          note: w.note, freq: w.freq,
          black: false, alive: true, flash: 0,
          isBottom: s === BOT_SLICES - 1,
        });
      }
    }

    for (const b of blacks) {
      const bx = b.tStart * unitPx;
      const bw = (b.tEnd - b.tStart) * unitPx;
      for (let s = 0; s < TOP_SLICES; s++) {
        blocks.push({
          x: bx, y: KEYBOARD_TOP + s * topSliceH, w: bw, h: topSliceH,
          note: b.note, freq: b.freq,
          black: true, alive: true, flash: 0, isBottom: false,
        });
      }
    }
  };

  // ---- Paddle & balls ----
  const PADDLE_W_FULL = 110;
  const PADDLE_W_SHRUNK = 85;
  const paddle = { w: PADDLE_W_FULL, h: 12, x: W/2 - PADDLE_W_FULL/2, y: 30 };
  const BALL_SPEED = 5.5;
  const BALL_SPEED_MAX = 14;
  const BALL_SPEED_MULT = 1.07;
  const BALL_R = 8;
  const MAX_LIVES = 3;
  const MAX_MULT = 8;
  const SHRINK_THRESHOLD = 50; // dead blocks needed to shrink paddle
  const CHORD_WINDOW_MS = 350;
  const CHORD_COOLDOWN_MS = 200;
  const CHORD_BONUS_MULT = 10;
  const TOKEN_DROP_CHANCE = 0.08;   // ~1 in 12 blocks drops a token
  const TOKEN_SPEED = 2.8;           // px/frame, slow so paddle can catch
  const TOKEN_W = 26, TOKEN_H = 16;  // capsule dimensions
  const TOKEN_EXTRA_BALLS = 2;
  const MAX_BALLS = 5;

  let balls = [];
  let score = 0;
  let gameOver = false, won = false;
  let lives = MAX_LIVES;
  let multiplier = 1;
  let peakMultiplier = 1;
  let paddleShrunk = false;
  let shakeUntil = 0, flashUntil = 0, lostDotAt = 0;
  let chordCooldownUntil = 0, chordFlashUntil = 0;
  const recentHits = new Map(); // pitchClass -> last hit time
  const floatingTexts = [];
  const tokens = []; // { x, y, vy } — "+2 balls" drops rising toward paddle

  // Musical composition — every destroyed key is recorded; on win the
  // whole sequence plays back with gaps clamped into a musical range.
  const composition = []; // { note, freq, time } — time = ms since first hit
  const lifeLossAfter = []; // composition indices after which a crotchet rest belongs
  let compositionStart = 0;
  let playbackGen = 0;   // increment to cancel any in-flight playback timeouts
  let playbackUntil = 0; // timestamp when playback ends (0 = not playing)
  let playbackIndex = -1; // absolute composition index of the currently-playing note

  const launchBall = () => {
    balls.push({
      x: paddle.x + paddle.w / 2,
      y: paddle.y + paddle.h + BALL_R + 2,
      vx: (Math.random() * 2 - 1) * BALL_SPEED * 0.45,
      vy: BALL_SPEED * 0.9,
      r: BALL_R,
    });
  };

  const resetGame = () => {
    buildBlocks();
    balls = [];
    score = 0;
    gameOver = false; won = false;
    lives = MAX_LIVES;
    multiplier = 1;
    peakMultiplier = 1;
    paddleShrunk = false;
    paddle.w = PADDLE_W_FULL;
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x + (PADDLE_W_FULL - paddle.w) / 2));
    shakeUntil = 0; flashUntil = 0; lostDotAt = 0;
    chordCooldownUntil = 0; chordFlashUntil = 0;
    recentHits.clear();
    floatingTexts.length = 0;
    tokens.length = 0;
    composition.length = 0;
    lifeLossAfter.length = 0;
    compositionStart = 0;
    playbackGen++; // cancels any pending playback timeouts
    playbackUntil = 0;
    playbackIndex = -1;
  };

  // ---- Input ----
  let playButtonRect = null; // canvas-space rect for "Play composition" button
  const toCanvas = (clientX, clientY) => {
    const r = canvas.getBoundingClientRect();
    return {
      x: (clientX - r.left) * (W / r.width),
      y: (clientY - r.top) * (H / r.height),
    };
  };
  const aimPaddle = (clientX) => {
    const r = canvas.getBoundingClientRect();
    const mx = (clientX - r.left) * (W / r.width);
    paddle.x = Math.max(0, Math.min(W - paddle.w, mx - paddle.w / 2));
  };
  const hitPlayButton = (cx, cy) => {
    const b = playButtonRect;
    return b && cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h;
  };
  const fireClick = (cx, cy) => {
    initAudio();
    if (gameOver || won) {
      if (hitPlayButton(cx, cy) && composition.length > 0) {
        playComposition();
        return;
      }
      resetGame();
      return;
    }
    if (balls.length === 0 && lives > 0) launchBall();
    // else: ball in flight, swallow the tap (audio already unlocked)
  };

  let lastMouseX = -1, lastMouseY = -1;
  canvas.addEventListener('mousemove', (e) => {
    const c = toCanvas(e.clientX, e.clientY);
    lastMouseX = c.x;
    lastMouseY = c.y;
    if (!(gameOver || won)) aimPaddle(e.clientX);
  });
  canvas.addEventListener('mouseleave', () => { lastMouseX = -1; lastMouseY = -1; });
  canvas.addEventListener('click', (e) => {
    const { x, y } = toCanvas(e.clientX, e.clientY);
    fireClick(x, y);
  });

  // Touch: drag to aim, tap to launch. preventDefault stops page scroll/zoom.
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    if (t) {
      aimPaddle(t.clientX);
      const { x, y } = toCanvas(t.clientX, t.clientY);
      fireClick(x, y);
    } else {
      fireClick(-1, -1);
    }
  }, { passive: false });
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches[0]) aimPaddle(e.touches[0].clientX);
  }, { passive: false });

  // P key: play composition from the game-over or win overlay.
  window.addEventListener('keydown', (e) => {
    if (e.key !== 'p' && e.key !== 'P') return;
    if (!(gameOver || won)) return;
    if (composition.length === 0) return;
    if (performance.now() < playbackUntil) return; // already playing
    e.preventDefault();
    initAudio();
    playComposition();
  });

  // ---- Collision ----
  const overlapArea = (ball, b) => {
    const dx = Math.min(ball.x + ball.r, b.x + b.w) - Math.max(ball.x - ball.r, b.x);
    const dy = Math.min(ball.y + ball.r, b.y + b.h) - Math.max(ball.y - ball.r, b.y);
    return dx > 0 && dy > 0 ? dx * dy : 0;
  };

  const resolveBounce = (ball, b) => {
    const left = (ball.x + ball.r) - b.x;
    const right = (b.x + b.w) - (ball.x - ball.r);
    const top = (ball.y + ball.r) - b.y;
    const bottom = (b.y + b.h) - (ball.y - ball.r);
    const minX = Math.min(left, right);
    const minY = Math.min(top, bottom);
    if (minX < minY) {
      ball.vx = -ball.vx;
      ball.x += left < right ? -minX : minX;
    } else {
      ball.vy = -ball.vy;
      ball.y += top < bottom ? -minY : minY;
    }
  };

  // ---- Update ----
  const update = () => {
    if (gameOver || won) return;

    for (let i = balls.length - 1; i >= 0; i--) {
      const ball = balls[i];
      ball.x += ball.vx;
      ball.y += ball.vy;

      if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
      if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
      if (ball.y + ball.r > H) { ball.y = H - ball.r; ball.vy = -Math.abs(ball.vy); }

      if (ball.vy < 0 &&
          ball.y - ball.r < paddle.y + paddle.h &&
          ball.y + ball.r > paddle.y &&
          ball.x + ball.r > paddle.x &&
          ball.x - ball.r < paddle.x + paddle.w) {
        ball.y = paddle.y + paddle.h + ball.r;
        const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        const cur = Math.hypot(ball.vx, ball.vy) || BALL_SPEED;
        const speed = Math.min(BALL_SPEED_MAX, cur * BALL_SPEED_MULT);
        const angle = hit * (Math.PI / 3);
        ball.vx = Math.sin(angle) * speed;
        ball.vy = Math.cos(angle) * speed;
      }

      if (ball.y + ball.r < 0) {
        balls.splice(i, 1);
        // Only penalize when the LAST ball exits — extra balls from
        // power-ups are free drops (classic Breakout multiball rule).
        if (balls.length === 0) {
          lives--;
          multiplier = 1;
          const now = performance.now();
          shakeUntil = now + 250;
          flashUntil = now + 150;
          lostDotAt = now;
          tokens.length = 0; // Clear any falling tokens with the rally
          // Life-loss rest: drop a crotchet rest after the last played note.
          if (composition.length > 0) lifeLossAfter.push(composition.length - 1);
          // Descending tritone stinger
          playNote('C5');
          setTimeout(() => { try { playNote('F#4'); } catch (e) {} }, 80);
        }
        continue;
      }

      let best = null, bestA = 0;
      for (const b of blocks) {
        if (!b.alive) continue;
        const a = overlapArea(ball, b);
        if (a > bestA) { bestA = a; best = b; }
      }
      if (best) {
        best.alive = false;
        best.flash = 1;
        playNote(best.note);
        score += multiplier;
        multiplier = Math.min(MAX_MULT, multiplier + 1);
        if (multiplier > peakMultiplier) peakMultiplier = multiplier;

        // Power-up drop: rare chance a block drops a "+2 balls" capsule
        // that rises toward the paddle. Cap 2 in flight so cascades don't spam.
        if (tokens.length < 2 && balls.length < MAX_BALLS && Math.random() < TOKEN_DROP_CHANCE) {
          tokens.push({
            x: best.x + best.w / 2,
            y: best.y + best.h / 2,
            vy: -TOKEN_SPEED,
            spawnedAt: performance.now(),
          });
        }

        // Record the hit into the running composition
        const hitTime = performance.now();
        if (composition.length === 0) compositionStart = hitTime;
        composition.push({
          note: best.note,
          freq: best.freq,
          time: hitTime - compositionStart,
        });

        // Chord bonus: record pitch class, look for triad in recent window
        const pc = pitchClass(best.note);
        recentHits.set(pc, hitTime);
        for (const [p, t] of recentHits) {
          if (hitTime - t > CHORD_WINDOW_MS) recentHits.delete(p);
        }
        if (hitTime >= chordCooldownUntil) {
          const chord = detectChord(Array.from(recentHits.keys()));
          if (chord) {
            const bonus = CHORD_BONUS_MULT * multiplier;
            score += bonus;
            chordFlashUntil = hitTime + 250;
            chordCooldownUntil = hitTime + CHORD_COOLDOWN_MS;
            const oct = 4;
            playNote(PC_NAMES[chord.root] + oct, 0.4);
            playNote(PC_NAMES[(chord.root + chord.third) % 12] + oct, 0.4);
            playNote(PC_NAMES[(chord.root + chord.fifth) % 12] + oct, 0.4);
            floatingTexts.push({
              text: `${chordLabel(chord)} +${bonus}`,
              x: ball.x,
              y: ball.y,
              startTime: hitTime,
            });
          }
        }

        resolveBounce(ball, best);
      }
    }

    // Token update: move toward paddle, check catch, drop if they escape
    for (let i = tokens.length - 1; i >= 0; i--) {
      const tk = tokens[i];
      tk.y += tk.vy;
      // Paddle catch — overlap with paddle rect
      if (tk.y - TOKEN_H / 2 < paddle.y + paddle.h &&
          tk.y + TOKEN_H / 2 > paddle.y &&
          tk.x + TOKEN_W / 2 > paddle.x &&
          tk.x - TOKEN_W / 2 < paddle.x + paddle.w) {
        tokens.splice(i, 1);
        // Add extra balls, up to cap, split from an existing ball if any
        const source = balls[0];
        const spawnX = source ? source.x : paddle.x + paddle.w / 2;
        const spawnY = source ? source.y : paddle.y + paddle.h + BALL_R + 2;
        const baseSpeed = source ? Math.hypot(source.vx, source.vy) : BALL_SPEED;
        for (let k = 0; k < TOKEN_EXTRA_BALLS && balls.length < MAX_BALLS; k++) {
          const angle = (Math.random() - 0.5) * (Math.PI / 2); // spread ±45°
          balls.push({
            x: spawnX,
            y: spawnY,
            vx: Math.sin(angle) * baseSpeed,
            vy: Math.cos(angle) * baseSpeed * (source ? Math.sign(source.vy) || 1 : 1),
            r: BALL_R,
          });
        }
        // Pleasant confirmation tone
        playNote('C6', 0.5);
        floatingTexts.push({
          text: '+2 balls',
          x: paddle.x + paddle.w / 2,
          y: paddle.y + paddle.h + 24,
          startTime: performance.now(),
        });
        continue;
      }
      // Off-screen: past the top (tokens rise in this inverted layout)
      if (tk.y + TOKEN_H / 2 < 0) tokens.splice(i, 1);
    }

    // Paddle shrink at half cleared
    if (!paddleShrunk) {
      const dead = blocks.reduce((n, b) => n + (b.alive ? 0 : 1), 0);
      if (dead >= SHRINK_THRESHOLD) {
        const center = paddle.x + paddle.w / 2;
        paddle.w = PADDLE_W_SHRUNK;
        paddle.x = Math.max(0, Math.min(W - paddle.w, center - paddle.w / 2));
        paddleShrunk = true;
      }
    }

    if (!won && blocks.every(b => !b.alive)) {
      won = true;
      playComposition();
    } else if (!gameOver && lives === 0 && balls.length === 0) {
      gameOver = true;
      playComposition();
    }
  };

  // Play back the recorded composition. Raw gameplay gaps get clamped to
  // [50ms, 400ms] so a wild rally turns into something that actually sounds
  // like music. playbackGen gates each scheduled note — resetGame bumps
  // the counter to cancel any in-flight timeouts.
  const playComposition = () => {
    if (composition.length === 0) return;
    const PLAYBACK_DELAY = 900;   // pause before starting, lets the "win" moment land
    const myGen = ++playbackGen;

    // Playback follows the same 4/4 quantization as the rendered staff:
    // each note sounds at its sequential (bar*8 + pos) * 250ms time.
    const { els } = buildScore();
    const compIdxToSeqMs = new Map();
    for (const e of els) {
      if (e.type === 'note') {
        compIdxToSeqMs.set(e.compIdx, (e.bar * QUAVERS_PER_BAR + e.pos) * QUAVER_MS);
      }
    }

    let latest = 0;
    for (let i = 0; i < composition.length; i++) {
      const entry = composition[i];
      const seqMs = compIdxToSeqMs.get(i) ?? 0;
      const when = PLAYBACK_DELAY + seqMs;
      if (when > latest) latest = when;
      setTimeout(() => {
        if (myGen !== playbackGen) return;
        playbackIndex = i;
        playNote(entry.note, 0.7);
        floatingTexts.push({
          text: '♪ ' + entry.note,
          x: noteToX.get(entry.note) ?? W / 2,
          y: KEYBOARD_TOP - 8,
          startTime: performance.now(),
        });
      }, when);
    }
    setTimeout(() => {
      if (myGen !== playbackGen) return;
      playbackIndex = -1;
    }, latest + 1200);
    playbackUntil = performance.now() + latest + 1400;
  };

  // ---- Draw ----
  const drawSlice = (b) => {
    const alpha = b.alive ? 1 : Math.max(0, b.flash);
    if (!b.alive && alpha <= 0) return;
    ctx.globalAlpha = alpha;
    if (b.black) {
      const g = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
      g.addColorStop(0, '#2a2a2a'); g.addColorStop(1, '#000');
      ctx.fillStyle = g;
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.strokeRect(b.x + 0.5, b.y + 0.5, b.w - 1, b.h - 1);
    } else {
      const g = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
      g.addColorStop(0, '#fafafa'); g.addColorStop(1, '#dcdcdc');
      ctx.fillStyle = g;
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.strokeStyle = 'rgba(0,0,0,0.22)';
      ctx.strokeRect(b.x + 0.5, b.y + 0.5, b.w - 1, b.h - 1);
      if (b.isBottom) {
        ctx.fillStyle = '#888';
        ctx.font = '11px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(b.note, b.x + b.w / 2, b.y + b.h - 8);
      }
    }
    ctx.globalAlpha = 1;
  };

  const drawBall = (x, y) => {
    ctx.fillStyle = '#ffd23a';
    ctx.beginPath();
    ctx.arc(x, y, BALL_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#b8860b';
    ctx.stroke();
  };

  // Staff step: diatonic offset from E4 (bottom line of treble clef). On-staff
  // notes run steps 0 (E4) through 8 (F5); below/above need ledger lines.
  const DIATONIC = { C: 0, D: 1, E: 2, F: 3, G: 4, A: 5, B: 6 };
  const staffStep = (note) => {
    const letter = note[0];
    const oct = parseInt(note.match(/\d/)[0], 10);
    return DIATONIC[letter] + (oct - 4) * 7 - 2; // relative to E4 at line 1
  };

  // ---- Staff rendering (simple 4/4 — crotchets and quavers only) ----
  // Build a flat list of {bar, pos, dur, type, compIdx?, note?} elements.
  // pos is a quaver position (0..7) inside a bar. dur is 1 (quaver) or
  // 2 (crotchet). Each bar always sums to exactly 8 quavers. A bar with
  // no notes renders as a single centred whole-bar rest.
  const BPM_FIXED = 120;
  const QUAVER_MS = 60000 / BPM_FIXED / 2; // 250ms
  const QUAVERS_PER_BAR = 8;

  const buildScore = () => {
    const els = [];
    if (composition.length === 0) return { els, totalBars: 0 };
    let bar = 0, pos = 0;
    const advance = (d) => {
      pos += d;
      while (pos >= QUAVERS_PER_BAR) { bar += 1; pos -= QUAVERS_PER_BAR; }
    };
    // How many life-loss crotchet rests should be inserted after each note.
    const restsAfter = new Map();
    for (const idx of lifeLossAfter) {
      restsAfter.set(idx, (restsAfter.get(idx) || 0) + 1);
    }
    const placeCrotchetRest = () => {
      const dur = pos + 2 > QUAVERS_PER_BAR ? 1 : 2; // downgrade at bar edge
      els.push({ type: 'rest', bar, pos, dur });
      advance(dur);
    };
    for (let i = 0; i < composition.length; i++) {
      const c = composition[i];
      const rawGapMs = i < composition.length - 1
        ? composition[i + 1].time - c.time
        : QUAVER_MS * 2; // default last note = 1 crotchet
      const rawGapQ = rawGapMs / QUAVER_MS;
      let noteDur = rawGapQ <= 1 ? 1 : 2;
      if (noteDur === 2 && pos + 2 > QUAVERS_PER_BAR) noteDur = 1; // downgrade at bar edge
      els.push({ type: 'note', bar, pos, dur: noteDur, compIdx: i, note: c.note });
      advance(noteDur);
      const lossCount = restsAfter.get(i) || 0;
      for (let r = 0; r < lossCount; r++) placeCrotchetRest();
    }
    const totalBars = bar + (pos > 0 ? 1 : 0);
    return { els, totalBars: Math.max(totalBars, 1) };
  };

  // Convert our internal 1/2-quaver durations to the {1,2,4,8,16} semiquaver
  // codes that drawNoteHead / drawRest expect (a quaver = 2 semiquavers,
  // a crotchet = 4, a whole-bar rest = 16).
  const toSemiqCode = (dur, isWholeBar) => isWholeBar ? 16 : (dur === 1 ? 2 : 4);

  const drawMusicStaff = () => {
    if (composition.length === 0) return;
    const SS = 6;
    const staffH = SS * 4;
    const lineGap = 22;
    const linePitch = staffH + lineGap;
    const staffTop = 52;
    const clefW = 22;
    const timeSigW = 18;
    const padding = 20;
    const VISIBLE_LINES = 3;

    const maxLineW = W - padding * 2;
    const BARS_PER_LINE = maxLineW > 500 ? 3 : 2;
    const LINE_QUAVERS = BARS_PER_LINE * QUAVERS_PER_BAR;
    const BAR_START_PAD = 14; // breathing room between bar line (or clef) and first note slot
    const contentOffset = clefW + timeSigW;
    const pxPerQuaver = (maxLineW - contentOffset - BARS_PER_LINE * BAR_START_PAD) / LINE_QUAVERS;
    const pxPerBar = BAR_START_PAD + QUAVERS_PER_BAR * pxPerQuaver;
    const staffW = maxLineW;
    const staffX = (W - staffW) / 2;

    const { els, totalBars } = buildScore();
    const totalLines = Math.max(1, Math.ceil(totalBars / BARS_PER_LINE));

    // Quick lookup: composition index → element (for playback highlight)
    const elByCompIdx = new Map();
    for (const e of els) if (e.type === 'note') elByCompIdx.set(e.compIdx, e);

    // During playback, scroll so the active line sits at the bottom of the
    // visible window. Outside playback, show the latest lines.
    const isPlayingBack = performance.now() < playbackUntil
      && playbackIndex >= 0 && playbackIndex < composition.length;
    let firstVisibleLine;
    if (isPlayingBack) {
      const activeEl = elByCompIdx.get(playbackIndex);
      const activeLine = activeEl ? Math.floor(activeEl.bar / BARS_PER_LINE) : totalLines - 1;
      firstVisibleLine = Math.max(0, Math.min(
        totalLines - VISIBLE_LINES,
        activeLine - VISIBLE_LINES + 1
      ));
    } else {
      firstVisibleLine = Math.max(0, totalLines - VISIBLE_LINES);
    }

    const headW = SS * 1.25;
    const headH = SS * 0.9;
    const stemLen = SS * 3.0;
    const yForStep = (step, y0) => y0 + (8 - step) * (SS / 2);

    // ---------- helpers ----------
    const drawNoteHead = (x, y, step, isSharp, semiqCode, ink, scale = 1, stemOverride = null, skipFlag = false) => {
      // Ledger lines
      if (step <= -2) {
        ctx.strokeStyle = ink;
        ctx.lineWidth = 1;
        const ly2 = y + (0 - step) * (SS / 2);
        ctx.beginPath();
        ctx.moveTo(x - headW * 0.8, ly2);
        ctx.lineTo(x + headW * 0.8, ly2);
        ctx.stroke();
      }
      if (step >= 10) {
        ctx.strokeStyle = ink;
        ctx.lineWidth = 1;
        const ly2 = y + (10 - step) * (SS / 2);
        ctx.beginPath();
        ctx.moveTo(x - headW * 0.8, ly2);
        ctx.lineTo(x + headW * 0.8, ly2);
        ctx.stroke();
      }
      if (isSharp) {
        ctx.fillStyle = ink;
        ctx.font = `${SS * 1.8}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('♯', x - headW - 2, y);
      }
      // Head — filled for crotchet/quaver, open for semibreve (centred whole-bar notes only)
      const filled = semiqCode <= 4;
      ctx.fillStyle = ink;
      ctx.strokeStyle = ink;
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.ellipse(x, y, (headW / 2) * scale, (headH / 2) * scale, -0.3, 0, Math.PI * 2);
      if (filled) ctx.fill(); else ctx.stroke();
      if (semiqCode === 16) return; // semibreve: no stem, no flags
      // Stem (direction may be forced to match beam-group partner)
      const stemUp = stemOverride !== null ? stemOverride : step <= 4;
      const stemX = stemUp ? x + headW / 2 - 0.5 : x - headW / 2 + 0.5;
      const stemTipY = stemUp ? y - stemLen : y + stemLen;
      ctx.strokeStyle = ink;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(stemX, y);
      ctx.lineTo(stemX, stemTipY);
      ctx.stroke();
      // Single flag for quaver, none for crotchet — suppressed for beamed quavers
      if (semiqCode === 2 && !skipFlag) {
        const flagLen = SS * 1.4;
        const flagDrop = SS * 1.4;
        ctx.strokeStyle = ink;
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(stemX, stemTipY);
        ctx.lineTo(stemX + flagLen, stemTipY + (stemUp ? flagDrop : -flagDrop));
        ctx.stroke();
      }
    };

    const drawRest = (x, y0, semiqCode, ink) => {
      ctx.fillStyle = ink;
      ctx.strokeStyle = ink;
      const midY = y0 + 2 * SS;
      const line2Y = y0 + SS;
      if (semiqCode === 16) {
        // Whole-bar rest: rectangle hanging from line 2
        const rw = SS * 1.4, rh = SS * 0.55;
        ctx.fillRect(x - rw / 2, line2Y - rh, rw, rh);
      } else if (semiqCode === 4) {
        // Crotchet rest: stylised "Z"
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(x - SS * 0.6, y0 + SS * 0.6);
        ctx.quadraticCurveTo(x + SS * 0.2, y0 + SS * 1.2, x - SS * 0.3, y0 + SS * 1.9);
        ctx.quadraticCurveTo(x + SS * 0.5, y0 + SS * 2.4, x - SS * 0.2, y0 + SS * 3.1);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(x + SS * 0.2, y0 + SS * 3.4, SS * 0.25, 0, Math.PI * 2);
        ctx.fill();
      } else if (semiqCode === 2) {
        // Quaver rest: flag with filled dot
        ctx.lineWidth = 1.3;
        ctx.beginPath();
        ctx.moveTo(x + SS * 0.4, y0 + SS * 0.8);
        ctx.lineTo(x - SS * 0.2, y0 + SS * 3.2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(x + SS * 0.4, y0 + SS * 0.8, SS * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
    };

    ctx.save();

    for (let L = 0; L < VISIBLE_LINES && (firstVisibleLine + L) < totalLines; L++) {
      const lineIdx = firstVisibleLine + L;
      const y0 = staffTop + L * linePitch;
      const isFading = firstVisibleLine > 0 && L === 0;
      const dim = isFading ? 0.5 : 1.0;
      const contentStart = staffX + contentOffset;
      const ink = `rgba(255, 220, 200, ${0.85 * dim})`;
      const faintInk = `rgba(255, 220, 200, ${0.32 * dim})`;

      // Staff lines
      ctx.strokeStyle = faintInk;
      ctx.lineWidth = 1;
      for (let i = 0; i < 5; i++) {
        const y = y0 + i * SS;
        ctx.beginPath();
        ctx.moveTo(staffX, y);
        ctx.lineTo(staffX + staffW, y);
        ctx.stroke();
      }

      // Treble clef
      ctx.fillStyle = `rgba(255, 220, 200, ${0.55 * dim})`;
      ctx.font = `${staffH * 1.5}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('𝄞', staffX + clefW / 2, y0 + staffH / 2 + SS * 0.3);

      if (lineIdx === 0) {
        ctx.fillStyle = `rgba(255, 220, 200, ${0.7 * dim})`;
        ctx.font = `bold ${SS * 2.1}px -apple-system, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('4', staffX + clefW + timeSigW / 2, y0 + SS);
        ctx.fillText('4', staffX + clefW + timeSigW / 2, y0 + SS * 3);
      }

      // Bar lines
      ctx.strokeStyle = faintInk;
      ctx.lineWidth = 1;
      for (let b = 1; b <= BARS_PER_LINE; b++) {
        const bx = contentStart + b * pxPerBar;
        ctx.beginPath();
        ctx.moveTo(bx, y0);
        ctx.lineTo(bx, y0 + staffH);
        ctx.stroke();
      }

      const lineStartBar = lineIdx * BARS_PER_LINE;
      for (let b = 0; b < BARS_PER_LINE; b++) {
        const barIdx = lineStartBar + b;
        if (barIdx >= totalBars) break;
        const barX = contentStart + b * pxPerBar;
        const barEls = els.filter((e) => e.bar === barIdx);

        // Beam detection: per 4/4 beat (pos pairs 0-1, 2-3, 4-5, 6-7),
        // a pair of adjacent quaver notes beams together.
        const beamPairs = [];
        const beamedSet = new Set();
        const stemDirMap = new Map();  // element → forced stem direction (bool up)
        for (let beat = 0; beat < 4; beat++) {
          const p1 = beat * 2;
          const p2 = p1 + 1;
          const e1 = barEls.find((e) => e.pos === p1 && e.type === 'note' && e.dur === 1);
          const e2 = barEls.find((e) => e.pos === p2 && e.type === 'note' && e.dur === 1);
          if (e1 && e2) {
            // Force both stems same direction based on average pitch
            const avg = (staffStep(e1.note) + staffStep(e2.note)) / 2;
            const up = avg <= 4;
            beamPairs.push({ e1, e2, up });
            beamedSet.add(e1);
            beamedSet.add(e2);
            stemDirMap.set(e1, up);
            stemDirMap.set(e2, up);
          }
        }

        // Draw notes + rests
        for (const e of barEls) {
          const x = barX + e.pos * pxPerQuaver + BAR_START_PAD + Math.min(pxPerQuaver * 0.15, 3);
          if (e.type === 'note') {
            const step = staffStep(e.note);
            const isSharp = e.note.replace(/\d/g, '').length === 2;
            const stemDir = stemDirMap.has(e) ? stemDirMap.get(e) : null;
            drawNoteHead(
              x, yForStep(step, y0), step, isSharp,
              toSemiqCode(e.dur, false), ink, 1, stemDir, beamedSet.has(e)
            );
          } else {
            drawRest(x, y0, toSemiqCode(e.dur, false), ink);
          }
        }

        // Draw beams on top of stems
        for (const { e1, e2, up } of beamPairs) {
          const x1 = barX + e1.pos * pxPerQuaver + BAR_START_PAD + Math.min(pxPerQuaver * 0.15, 3);
          const x2 = barX + e2.pos * pxPerQuaver + BAR_START_PAD + Math.min(pxPerQuaver * 0.15, 3);
          const y1 = yForStep(staffStep(e1.note), y0);
          const y2 = yForStep(staffStep(e2.note), y0);
          const tip1 = up ? y1 - stemLen : y1 + stemLen;
          const tip2 = up ? y2 - stemLen : y2 + stemLen;
          const stemX1 = up ? x1 + headW / 2 - 0.5 : x1 - headW / 2 + 0.5;
          const stemX2 = up ? x2 + headW / 2 - 0.5 : x2 - headW / 2 + 0.5;
          ctx.strokeStyle = ink;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(stemX1, tip1);
          ctx.lineTo(stemX2, tip2);
          ctx.stroke();
        }
      }
    }

    // Active-note highlight (no playhead line)
    const now = performance.now();
    if (now < playbackUntil && playbackIndex >= 0 && playbackIndex < composition.length) {
      const activeEl = elByCompIdx.get(playbackIndex);
      if (activeEl) {
        const activeLineIdx = Math.floor(activeEl.bar / BARS_PER_LINE);
        if (activeLineIdx >= firstVisibleLine && activeLineIdx < firstVisibleLine + VISIBLE_LINES) {
          const L = activeLineIdx - firstVisibleLine;
          const y0 = staffTop + L * linePitch;
          const contentStart = staffX + contentOffset;
          const barWithinLine = activeEl.bar - activeLineIdx * BARS_PER_LINE;
          const barX = contentStart + barWithinLine * pxPerBar;
          const x = barX + activeEl.pos * pxPerQuaver + BAR_START_PAD + Math.min(pxPerQuaver * 0.15, 3);
          const n = composition[playbackIndex];
          const step = staffStep(n.note);
          const y = yForStep(step, y0);
          const isSharp = n.note.replace(/\d/g, '').length === 2;

          ctx.fillStyle = 'rgba(255, 215, 100, 0.35)';
          ctx.beginPath();
          ctx.arc(x, y, headW * 1.2, 0, Math.PI * 2);
          ctx.fill();

          drawNoteHead(x, y, step, isSharp, toSemiqCode(activeEl.dur, false), 'rgba(255, 215, 100, 1)', 1.3);
        }
      }
    }

    ctx.restore();
  };

  const draw = () => {
    const now = performance.now();
    ctx.clearRect(0, 0, W, H);

    // Everything inside save/restore participates in the shake transform
    ctx.save();
    if (now < shakeUntil) {
      const t = (shakeUntil - now) / 250;
      const amp = 6 * t;
      ctx.translate((Math.random() - 0.5) * amp * 2, (Math.random() - 0.5) * amp * 2);
    }

    // watermark + score — centered in the open play field between paddle and keys
    const watermarkSize = Math.min(72, Math.round(W * 0.13));
    const scoreSize = Math.min(96, Math.round(W * 0.18));
    const fieldMid = (paddle.y + paddle.h + KEYBOARD_TOP) / 2;
    ctx.fillStyle = 'rgba(255, 220, 200, 0.10)';
    ctx.font = `bold ${watermarkSize}px -apple-system, system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('RobinBlocks.com', W / 2, fieldMid - scoreSize * 0.45);
    ctx.fillStyle = 'rgba(255, 220, 200, 0.22)';
    ctx.font = `bold ${scoreSize}px -apple-system, system-ui, sans-serif`;
    ctx.fillText('Score: ' + score, W / 2, fieldMid + watermarkSize * 0.5);

    // Combo chip (only when > 1)
    if (multiplier > 1) {
      const chipSize = Math.round(scoreSize * 0.42);
      ctx.fillStyle = 'rgba(255, 180, 100, 0.45)';
      ctx.font = `bold ${chipSize}px -apple-system, system-ui, sans-serif`;
      ctx.fillText('×' + multiplier, W / 2, fieldMid + watermarkSize * 0.5 + scoreSize * 0.7);
    }

    // Musical staff (background) — paddle/balls/blocks render on top
    drawMusicStaff();

    // Paddle
    ctx.fillStyle = '#e8e8e8';
    ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
    ctx.fillStyle = '#ff6a00';
    ctx.fillRect(paddle.x, paddle.y + paddle.h - 2, paddle.w, 2);

    // Blocks
    for (const b of blocks) drawSlice(b);
    for (const b of blocks) if (!b.alive && b.flash > 0) b.flash -= 0.06;

    // Active balls
    for (const ball of balls) drawBall(ball.x, ball.y);

    // Docked ball (waiting to be launched)
    const docked = !gameOver && !won && balls.length === 0 && lives > 0;
    if (docked) {
      drawBall(paddle.x + paddle.w / 2, paddle.y + paddle.h + BALL_R + 2);
    }

    // Power-up tokens ("+2") rising toward paddle
    for (const tk of tokens) {
      const pulse = 0.8 + 0.2 * Math.sin((now - tk.spawnedAt) / 120);
      // Capsule
      ctx.fillStyle = `rgba(110, 230, 180, ${pulse})`;
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.lineWidth = 1;
      const x = tk.x - TOKEN_W / 2, y = tk.y - TOKEN_H / 2;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(x, y, TOKEN_W, TOKEN_H, 8);
      else ctx.rect(x, y, TOKEN_W, TOKEN_H);
      ctx.fill();
      ctx.stroke();
      // Label
      ctx.fillStyle = '#0e3a2a';
      ctx.font = 'bold 11px -apple-system, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('+2', tk.x, tk.y + 0.5);
    }

    // Lives hearts (top-right, leftmost = life #1)
    const heartSize = 16, heartGap = 18, heartPad = 14;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < MAX_LIVES; i++) {
      const cx = W - heartPad - (MAX_LIVES - 1 - i) * heartGap;
      const cy = heartPad + 6;
      if (i < lives) {
        ctx.fillStyle = '#ff6a00';
        ctx.font = `${heartSize}px -apple-system, system-ui, sans-serif`;
        ctx.fillText('♥', cx, cy);
      } else if (i === lives && lostDotAt > 0 && now - lostDotAt < 200) {
        const t = (now - lostDotAt) / 200;
        const scale = t < 0.3 ? 1 + (t / 0.3) * 0.4 : 1.4 * (1 - (t - 0.3) / 0.7);
        ctx.fillStyle = `rgba(255, 106, 0, ${Math.max(0, 1 - t)})`;
        ctx.font = `${heartSize * Math.max(0.01, scale)}px -apple-system, system-ui, sans-serif`;
        ctx.fillText('♥', cx, cy);
      } else {
        ctx.fillStyle = 'rgba(255, 200, 150, 0.35)';
        ctx.font = `${heartSize}px -apple-system, system-ui, sans-serif`;
        ctx.fillText('♡', cx, cy);
      }
    }

    // Launch hint when docked (only on desktop — the bottom CSS hint also hidden on mobile)
    if (docked && lives === MAX_LIVES && score === 0) {
      ctx.fillStyle = '#aaa';
      ctx.font = '14px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('tap to launch', W / 2, paddle.y + paddle.h + BALL_R * 2 + 26);
    }

    // Floating chord banners (inside shake so they move with the world)
    const ftFont = Math.max(18, Math.min(28, Math.round(W * 0.05)));
    ctx.font = `bold ${ftFont}px -apple-system, system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
      const ft = floatingTexts[i];
      const age = now - ft.startTime;
      if (age > 1200) { floatingTexts.splice(i, 1); continue; }
      const t = age / 1200;
      const y = ft.y - t * 40;
      const alpha = t < 0.5 ? 1 : Math.max(0, 1 - (t - 0.5) * 2);
      ctx.fillStyle = `rgba(255, 220, 120, ${alpha})`;
      ctx.fillText(ft.text, ft.x, y);
    }

    ctx.restore();

    // Red vignette flash — outside shake so it's screen-fixed
    if (now < flashUntil) {
      const t = (flashUntil - now) / 150;
      const grad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.2, W / 2, H / 2, Math.max(W, H) * 0.6);
      grad.addColorStop(0, 'rgba(255,0,0,0)');
      grad.addColorStop(1, `rgba(255,0,0,${0.45 * t})`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    }

    // Gold chord-bonus vignette — also screen-fixed
    if (now < chordFlashUntil) {
      const t = (chordFlashUntil - now) / 250;
      const grad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.7);
      grad.addColorStop(0, 'rgba(255, 200, 90, 0)');
      grad.addColorStop(1, `rgba(255, 200, 90, ${0.35 * t})`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    }

    if (gameOver || won) {
      const playingBack = now < playbackUntil;
      const canPlayback = composition.length > 0 && !playingBack;

      // Slightly lighter overlay during playback so the note floats stay visible
      ctx.fillStyle = `rgba(0,0,0,${playingBack ? 0.4 : 0.6})`;
      const panelH = canPlayback ? 196 : 160;
      ctx.fillRect(0, H / 2 - panelH / 2, W, panelH);
      ctx.fillStyle = '#fff';
      ctx.font = '36px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const titleY = H / 2 - (canPlayback ? 58 : 32);
      ctx.fillText(won ? 'You cleared the keyboard!' : 'Game Over', W / 2, titleY);
      ctx.font = '18px -apple-system, sans-serif';
      ctx.fillStyle = '#e8d8cc';
      ctx.fillText(`Score ${score}   ·   Peak combo ×${peakMultiplier}`, W / 2, titleY + 32);

      if (canPlayback) {
        // "Play composition" pill
        const btnW = 220, btnH = 34;
        const btnX = W / 2 - btnW / 2;
        const btnY = titleY + 58;
        ctx.strokeStyle = 'rgba(255, 220, 120, 0.85)';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(btnX, btnY, btnW, btnH, 17);
        else ctx.rect(btnX, btnY, btnW, btnH);
        ctx.stroke();
        ctx.fillStyle = 'rgba(255, 220, 120, 0.95)';
        ctx.font = 'bold 14px -apple-system, sans-serif';
        ctx.fillText('♪ Play composition  ·  press P', W / 2, btnY + btnH / 2 + 0.5);
        playButtonRect = { x: btnX, y: btnY, w: btnW, h: btnH };

        ctx.font = '13px -apple-system, sans-serif';
        ctx.fillStyle = '#999';
        ctx.fillText('tap / click anywhere else to play again', W / 2, btnY + btnH + 18);
      } else {
        playButtonRect = null;
        ctx.font = '15px -apple-system, sans-serif';
        ctx.fillStyle = '#bbb';
        ctx.fillText(playingBack ? '♪ Playing your composition…' : 'tap to play again', W / 2, titleY + 64);
      }
    } else {
      playButtonRect = null;
    }
  };

  const syncCursor = () => {
    const overlayActive = gameOver || won;
    const target = !overlayActive
      ? 'none'
      : (playButtonRect && hitPlayButton(lastMouseX, lastMouseY) ? 'pointer' : 'default');
    if (canvas.style.cursor !== target) canvas.style.cursor = target;
  };
  const loop = () => { update(); draw(); syncCursor(); requestAnimationFrame(loop); };

  buildBlocks();
  loop();
})();
</script>
</body>
</html>
