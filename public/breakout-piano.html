<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Breakout Piano · Robin Blocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0b10;
    --ink: #f5f5f1;
    --ink-2: #b0b0aa;
    --rule: #1e1e24;
    --accent: oklch(0.72 0.17 75);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; min-height: 100vh; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 20px 20px 40px; }
  .back {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--ink-2); text-decoration: none; font-size: 13.5px; font-weight: 500;
    padding: 8px 12px; border-radius: 8px; border: 1px solid var(--rule);
  }
  .back:hover { color: var(--ink); background: var(--rule); }
  h1 { font-size: 38px; font-weight: 800; letter-spacing: -0.03em; margin: 18px 0 6px; }
  .sub { color: var(--ink-2); margin: 0 0 18px; font-size: 15px; }
  .hud {
    display: flex; gap: 18px; align-items: center;
    padding: 10px 14px; border: 1px solid var(--rule); border-radius: 12px;
    background: rgba(255,255,255,.02);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .hud b { font-weight: 600; color: var(--accent); margin-left: 6px; }
  canvas {
    display: block;
    width: 100%;
    max-width: 780px;
    aspect-ratio: 4 / 3;
    background: #08080c;
    border: 1px solid var(--rule);
    border-radius: 14px;
    touch-action: none;
  }
  .controls {
    margin-top: 14px;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  button.btn {
    padding: 10px 16px;
    background: var(--accent);
    color: #1a1a1a;
    font: inherit;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  button.btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--rule); }
  .hint { margin-top: 18px; color: var(--ink-2); font-size: 13px; line-height: 1.6; }
  .kbd { display: inline-block; padding: 1px 6px; border: 1px solid var(--rule); border-bottom-width: 2px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink); }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">← Back to list</a>
    <h1>Breakout Piano 🎹</h1>
    <p class="sub">Hit the bricks — each one is a piano key. Clear a row to play a scale.</p>
    <div class="hud">
      <span>Score <b id="score">0</b></span>
      <span>Lives <b id="lives">3</b></span>
      <span>Notes <b id="notes">0</b></span>
      <span>Level <b id="level">1</b></span>
    </div>
    <canvas id="game" width="780" height="585"></canvas>
    <div class="controls">
      <button class="btn" id="startBtn">Start</button>
      <button class="btn ghost" id="muteBtn">🔊 Sound</button>
      <button class="btn ghost" id="resetBtn">Reset</button>
    </div>
    <p class="hint">
      Move with <span class="kbd">←</span> <span class="kbd">→</span> or mouse · launch with <span class="kbd">Space</span> · bricks ring chromatically from C4. Clear the row for a glissando.
    </p>
  </div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // audio
  let muted = false;
  let ac;
  function ensureAudio() {
    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === 'suspended') ac.resume();
  }
  function playNote(midi, dur = 0.32, vel = 0.18) {
    if (muted) return;
    ensureAudio();
    const freq = 440 * Math.pow(2, (midi - 69) / 12);
    const t = ac.currentTime;
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vel, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g); g.connect(ac.destination);
    osc.start(t); osc.stop(t + dur + 0.05);
  }

  // bricks: grid of piano keys
  const ROWS = 4;
  const COLS = 14;
  const BRICK_PAD = 4;
  const BRICK_TOP = 50;
  const BRICK_W = (W - 2*20 - (COLS-1)*BRICK_PAD) / COLS;
  const BRICK_H = 28;

  let bricks = [];
  let paddle, ball, score, lives, notes, level, running, launched;

  // determine which keys are "black" in a chromatic pattern
  function isBlack(midi) {
    const m = ((midi % 12) + 12) % 12;
    return [1,3,6,8,10].includes(m);
  }

  function resetBricks() {
    bricks = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const midi = 60 + c + (ROWS - 1 - r) * 2; // ascending rows and cols
        bricks.push({
          x: 20 + c * (BRICK_W + BRICK_PAD),
          y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
          w: BRICK_W, h: BRICK_H,
          midi,
          alive: true,
          flash: 0,
        });
      }
    }
  }

  function reset(full = true) {
    paddle = { w: 110, h: 12, x: W/2 - 55, y: H - 40, speed: 9 };
    ball = { x: W/2, y: H - 55, r: 7, vx: 0, vy: 0 };
    launched = false;
    if (full) {
      score = 0; lives = 3; notes = 0; level = 1;
      resetBricks();
    }
    updateHud();
  }
  function updateHud() {
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = lives;
    document.getElementById('notes').textContent = notes;
    document.getElementById('level').textContent = level;
  }

  // input
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') { e.preventDefault(); if (!launched && running) launch(); }
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    paddle.x = Math.max(0, Math.min(W - paddle.w, mx - paddle.w/2));
  });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = (e.touches[0].clientX - rect.left) * (W / rect.width);
    paddle.x = Math.max(0, Math.min(W - paddle.w, mx - paddle.w/2));
  }, { passive: false });
  canvas.addEventListener('click', () => { if (!launched && running) launch(); });

  function launch() {
    launched = true;
    const base = 6 + level * 0.3;
    ball.vx = (Math.random() > 0.5 ? 1 : -1) * base * 0.6;
    ball.vy = -base;
  }

  document.getElementById('startBtn').onclick = () => {
    ensureAudio();
    if (!running) { running = true; loop(); }
    if (!launched) launch();
  };
  document.getElementById('resetBtn').onclick = () => { reset(true); running = false; draw(); };
  document.getElementById('muteBtn').onclick = (e) => {
    muted = !muted;
    e.target.textContent = muted ? '🔇 Muted' : '🔊 Sound';
  };

  function step() {
    // keyboard paddle
    if (keys['ArrowLeft']) paddle.x -= paddle.speed;
    if (keys['ArrowRight']) paddle.x += paddle.speed;
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

    if (!launched) {
      ball.x = paddle.x + paddle.w/2;
      ball.y = paddle.y - ball.r - 2;
      return;
    }

    ball.x += ball.vx;
    ball.y += ball.vy;

    // walls
    if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx *= -1; }
    if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx *= -1; }
    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -1; }

    // paddle
    if (ball.y + ball.r > paddle.y && ball.y + ball.r < paddle.y + paddle.h + 6 &&
        ball.x > paddle.x && ball.x < paddle.x + paddle.w && ball.vy > 0) {
      ball.y = paddle.y - ball.r;
      const hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
      const speed = Math.hypot(ball.vx, ball.vy) * 1.02;
      const angle = hit * (Math.PI/3);
      ball.vx = Math.sin(angle) * speed;
      ball.vy = -Math.abs(Math.cos(angle) * speed);
      playNote(48, 0.15, 0.08); // low thud on paddle
    }

    // bricks
    for (const b of bricks) {
      if (!b.alive) continue;
      if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
          ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
        // determine collision side
        const prevX = ball.x - ball.vx;
        const prevY = ball.y - ball.vy;
        const fromTop = prevY + ball.r <= b.y;
        const fromBot = prevY - ball.r >= b.y + b.h;
        if (fromTop || fromBot) ball.vy *= -1;
        else ball.vx *= -1;
        b.alive = false;
        b.flash = 1;
        score += 10;
        notes += 1;
        playNote(b.midi, 0.4, 0.22);
        updateHud();
        // check row clear
        const row = Math.round((b.y - BRICK_TOP) / (BRICK_H + BRICK_PAD));
        const rowBricks = bricks.filter(x => Math.round((x.y - BRICK_TOP) / (BRICK_H + BRICK_PAD)) === row);
        if (rowBricks.every(x => !x.alive)) {
          // glissando
          const notesArr = rowBricks.map(x => x.midi).sort((a,b)=>a-b);
          notesArr.forEach((n,i) => setTimeout(() => playNote(n, 0.25, 0.15), i*60));
          score += 50;
          updateHud();
        }
        break;
      }
    }

    // bottom
    if (ball.y - ball.r > H) {
      lives -= 1;
      updateHud();
      launched = false;
      playNote(36, 0.5, 0.2);
      if (lives <= 0) {
        running = false;
        setTimeout(() => { alert('Game over! Score: ' + score); reset(true); draw(); }, 50);
      }
    }

    // all clear -> next level
    if (bricks.every(b => !b.alive)) {
      level += 1;
      resetBricks();
      launched = false;
      updateHud();
    }
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    // bg grid
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 1;
    for (let x=0; x<W; x+=30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    // bricks
    for (const b of bricks) {
      if (!b.alive) continue;
      const black = isBlack(b.midi);
      ctx.fillStyle = black ? '#17171d' : '#f5f5f1';
      if (b.flash > 0) {
        ctx.fillStyle = `oklch(0.80 0.18 ${75 - (b.midi-60)*8})`;
      }
      roundRect(ctx, b.x, b.y, b.w, b.h, 4, true, false);
      // top hairline
      ctx.strokeStyle = black ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(b.x+1, b.y+1); ctx.lineTo(b.x + b.w - 1, b.y + 1); ctx.stroke();
      // key label
      if (!black) {
        ctx.fillStyle = 'rgba(0,0,0,.35)';
        ctx.font = '10px "JetBrains Mono", monospace';
        ctx.textAlign = 'center';
        const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        ctx.fillText(names[((b.midi%12)+12)%12], b.x + b.w/2, b.y + b.h - 8);
      }
    }

    // paddle
    ctx.fillStyle = '#f5f5f1';
    roundRect(ctx, paddle.x, paddle.y, paddle.w, paddle.h, 6, true, false);
    // ball
    ctx.fillStyle = 'oklch(0.80 0.18 75)';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();

    if (!launched && running) {
      ctx.fillStyle = 'rgba(245,245,241,0.7)';
      ctx.font = '600 14px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Click or press Space to launch', W/2, H - 70);
    }
    if (!running) {
      ctx.fillStyle = 'rgba(245,245,241,0.6)';
      ctx.font = '600 16px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Press Start to play', W/2, H/2);
    }
  }

  function roundRect(ctx, x, y, w, h, r, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
  }

  function loop() {
    if (!running) { draw(); return; }
    step();
    draw();
    requestAnimationFrame(loop);
  }

  reset(true);
  draw();
</script>
</body>
</html>
